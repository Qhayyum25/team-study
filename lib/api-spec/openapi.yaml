openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Smart Study Group Finder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: groups
    description: Study groups
  - name: members
    description: Group members
  - name: messages
    description: Group chat messages
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all study groups
      parameters:
        - name: subject
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupWithCount"

    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a study group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupBody"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group details
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group (admin only)
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /groups/{groupId}/join:
    post:
      operationId: joinGroup
      tags: [members]
      summary: Join a study group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /groups/{groupId}/members:
    get:
      operationId: getGroupMembers
      tags: [members]
      summary: Get group members
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /groups/{groupId}/messages:
    get:
      operationId: getGroupMessages
      tags: [messages]
      summary: Get group messages
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageWithUser"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageWithUser"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required:
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
      required:
        - id
        - name
        - email
        - role

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        subject:
          type: string
        topic:
          type: string
        examTarget:
          type: string
        createdBy:
          type: integer
      required:
        - id
        - name
        - subject
        - topic
        - examTarget
        - createdBy

    GroupWithCount:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            memberCount:
              type: integer
            isMember:
              type: boolean
          required:
            - memberCount
            - isMember

    GroupDetail:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            memberCount:
              type: integer
            isMember:
              type: boolean
            members:
              type: array
              items:
                $ref: "#/components/schemas/User"
          required:
            - memberCount
            - isMember
            - members

    CreateGroupBody:
      type: object
      properties:
        name:
          type: string
        subject:
          type: string
        topic:
          type: string
        examTarget:
          type: string
      required:
        - name
        - subject
        - topic
        - examTarget

    MessageWithUser:
      type: object
      properties:
        id:
          type: integer
        groupId:
          type: integer
        userId:
          type: integer
        message:
          type: string
        timestamp:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - id
        - groupId
        - userId
        - message
        - timestamp
        - user

    SendMessageBody:
      type: object
      properties:
        message:
          type: string
      required:
        - message
