kind = "web"
previewPath = "/"
title = "Smart Study Group Finder"
version = "1.0.0"
id = "artifacts/smart-study"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24111

[services.development]
run = "pnpm --filter @workspace/smart-study run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-study", "run", "build" ]
publicDir = "artifacts/smart-study/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24111"
BASE_PATH = "/"
